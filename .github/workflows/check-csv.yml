name: Check CSV for duplicate OTT IDs

on:
  push:
    paths:
      - "taxa.csv"
  pull_request:
    paths:
      - "taxa.csv"

permissions:
  contents: read

jobs:
  check-duplicates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for duplicate OTT IDs
        run: |
          # taxa.csv columns: name,scientific_name,ott_id,ott_name,uniqname,image_url,comments
          # Extract ott_id column (3rd column), skip header, ignore blanks,
          # sort and find duplicates.
          dupes=$(tail -n +2 taxa.csv \
            | python3 -c "
          import csv, sys
          ids = []
          for row in csv.reader(sys.stdin):
            if len(row) >= 3 and row[2].strip():
              ids.append(row[2].strip())
          from collections import Counter
          for val, cnt in Counter(ids).items():
            if cnt > 1:
              print(val)
          ")

          if [ -n "$dupes" ]; then
            echo "❌ Duplicate OTT IDs found in taxa.csv:"
            for id in $dupes; do
              echo "  ott_id=$id appears in these rows:"
              grep -n ",$id," taxa.csv || true
            done
            exit 1
          fi

          echo "✅ No duplicate OTT IDs found."
