name: Fill missing image URLs

on:
  workflow_dispatch: # manual trigger
  schedule:
    - cron: "0 6 * * 1" # weekly on Monday at 06:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  fill-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fill missing image URLs
        run: node scripts/fill-image-urls.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet species.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update species.csv with new image URLs"
          title: "Auto-fill missing image URLs in species.csv"
          body: |
            This PR was automatically generated by the **Fill missing image URLs** workflow.

            The script scanned `species.csv` for rows without an `image_url` and used
            the OneZoom API (with recursive descent through the Open Tree of Life taxonomy)
            to find suitable images.
          branch: auto/fill-image-urls
          delete-branch: true
